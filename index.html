  <script>
    'use strict';

    /* ============================================================
       PATCH NOTES UI — popup de note de mise à jour
       Affichée une seule fois par note publiée (par ID), avant les
       récompenses quotidiennes. Le joueur doit cliquer "OK" pour
       la fermer ; l'ID est ensuite mémorisé sur le joueur afin de
       ne plus la réafficher.
       ============================================================ */
    const PatchNotesUI = (() => {

      let _overlay = null;
      let _onDone  = null;

      /**
       * Affiche la popup si une note non encore vue est disponible.
       * Appelle `onDone` immédiatement si rien à afficher.
       * @param {Function} onDone
       */
      function presentIfNeeded(onDone) {
        _onDone = onDone || null;

        const state = GameState.get();
        const pn    = state.patchNotes || {};

        // Rien à afficher si la note est vide ou déjà vue par ce joueur
        if (!pn.id || !pn.text) { _finish(); return; }
        const player = GameState.getPlayer();
        if ((player.lastSeenPatchNotesId || '') === pn.id) { _finish(); return; }

        _injectStyles();
        _buildOverlay(pn.text);
      }

      function _finish() {
        if (_onDone) { const fn = _onDone; _onDone = null; fn(); }
      }

      function _injectStyles() {
        if (document.getElementById('pnui-styles')) return;
        const s = document.createElement('style');
        s.id = 'pnui-styles';
        s.textContent = `
#pnui-overlay{
  position:fixed;inset:0;z-index:4500;
  display:flex;align-items:center;justify-content:center;
  padding:24px;box-sizing:border-box;
  opacity:0;pointer-events:none;
  transition:opacity .3s ease;
}
#pnui-overlay.pnui-visible{opacity:1;pointer-events:all;}
#pnui-overlay.pnui-closing{opacity:0;}
.pnui-bg{
  position:absolute;inset:0;
  background:radial-gradient(ellipse at center,rgba(6,15,8,.93) 0%,rgba(2,6,3,.98) 75%);
  backdrop-filter:blur(4px);
}
.pnui-card{
  position:relative;z-index:2;
  width:100%;max-width:460px;
  background:linear-gradient(150deg,var(--surface-2),var(--surface));
  border:1px solid var(--border);border-radius:var(--radius-lg);
  padding:24px 20px 26px;
  display:flex;flex-direction:column;gap:14px;
  transform:scale(.88) translateY(18px);opacity:0;
  animation:pnuiCardIn .45s cubic-bezier(.2,1.4,.4,1) forwards .05s;
  box-shadow:0 0 50px rgba(244,194,103,.1);
}
@keyframes pnuiCardIn{to{transform:scale(1) translateY(0);opacity:1;}}
.pnui-title{
  font-family:var(--font-display);font-weight:700;
  font-size:1.05rem;color:var(--accent);letter-spacing:.02em;
}
.pnui-body{
  font-size:.86rem;line-height:1.65;color:#cde8d4;
  white-space:pre-wrap;word-break:break-word;
  max-height:55vh;overflow-y:auto;
  padding-right:4px;
}
.pnui-body::-webkit-scrollbar{width:4px;}
.pnui-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.pnui-ok-btn{
  align-self:stretch;padding:13px 0;border-radius:999px;
  background:var(--accent2);color:#000;font-weight:700;
  font-family:var(--font-display);font-size:.95rem;
  border:none;cursor:pointer;letter-spacing:.02em;
  transition:opacity .15s,transform .1s;
}
.pnui-ok-btn:hover{opacity:.88;transform:translateY(-1px);}
        `;
        document.head.appendChild(s);
      }

      function _buildOverlay(text) {
        document.getElementById('pnui-overlay')?.remove();
        _overlay = document.createElement('div');
        _overlay.id = 'pnui-overlay';

        // Echappement HTML puis mise en forme des retours à la ligne
        const div = document.createElement('div');
        div.textContent = text;
        const escaped = div.innerHTML;

        _overlay.innerHTML = `
          <div class="pnui-bg"></div>
          <div class="pnui-card">
            <div class="pnui-title">📋 Note de mise à jour</div>
            <div class="pnui-body">${escaped}</div>
            <button class="pnui-ok-btn" id="pnui-ok-btn">OK, compris !</button>
          </div>`;
        document.body.appendChild(_overlay);
        requestAnimationFrame(() => _overlay.classList.add('pnui-visible'));
        document.getElementById('pnui-ok-btn').addEventListener('click', _confirm);
      }

      function _confirm() {
        // Mémoriser l'ID de la note sur le joueur pour ne plus la réafficher
        const pn = GameState.get().patchNotes || {};
        if (pn.id) {
          GameState.updatePlayer({ lastSeenPatchNotesId: pn.id });
        }
        _close();
      }

      function _close() {
        if (!_overlay) { _finish(); return; }
        const ov = _overlay;
        _overlay = null;
        ov.classList.remove('pnui-visible');
        ov.classList.add('pnui-closing');
        setTimeout(() => { ov.remove(); _finish(); }, 320);
      }

      return { presentIfNeeded };
    })();

    /* ============================================================
       ACCOUNT SCREEN — sélection de compte au démarrage
       ============================================================ */
    const AccountScreen = (() => {

      const ICONS = ['🦊', '🐺', '🦁'];

      function _formatDate(ts) {
        if (!ts) return 'Jamais sauvegardé';
        const d = new Date(ts);
        return d.toLocaleDateString('fr-FR', { day:'2-digit', month:'2-digit', year:'numeric' })
          + ' ' + d.toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' });
      }

      function render() {
        const slots = SaveSystem.getSlotsInfo();
        const container = document.getElementById('account-slots-list');
        if (!container) return;

        container.innerHTML = slots.map(s => {
          if (s.empty) {
            return `<div class="account-slot empty" data-slot="${s.slot}" onclick="AccountScreen.select(${s.slot})">
              <div class="account-slot-icon">${ICONS[s.slot - 1]}</div>
              <div class="account-slot-info">
                <div class="account-slot-name">Compte ${s.slot} — vide</div>
                <div class="account-slot-meta">Nouvelle partie</div>
              </div>
            </div>`;
          }
          return `<div class="account-slot" data-slot="${s.slot}" onclick="AccountScreen.select(${s.slot})">
            <div class="account-slot-icon">${ICONS[s.slot - 1]}</div>
            <div class="account-slot-info">
              <div class="account-slot-name">${s.playerName} <span style="color:var(--accent2);font-weight:600;">· Niv. ${s.playerLevel}</span></div>
              <div class="account-slot-meta">🐾 ${s.bestiaireFound}/${s.totalCreatures}</div>
              <div class="account-slot-meta">${_formatDate(s.timestamp)}</div>
            </div>
            <span class="account-slot-badge">Compte ${s.slot}</span>
            <button class="account-slot-del" title="Supprimer ce compte"
              onclick="event.stopPropagation(); AccountScreen.deleteSlot(${s.slot})">✕</button>
          </div>`;
        }).join('');
      }

      function select(slot) {
        const slots = SaveSystem.getSlotsInfo();
        const info  = slots.find(s => s.slot === slot);
        if (info && info.empty) {
          // Slot vide → demander le nom avant de démarrer
          _askName(slot);
        } else {
          // Slot existant → démarrer directement
          _launchSlot(slot);
        }
      }

      function _askName(slot) {
        const container = document.getElementById('account-slots-list');
        const icon = ['🦊','🐺','🦁'][slot - 1];
        container.innerHTML = `
          <div class="account-name-form">
            <h2>${icon} Nouveau dresseur — Compte ${slot}</h2>
            <p>Choisissez le nom qui apparaîtra sur votre profil et dans le Bestiaire.</p>
            <input
              class="account-name-input"
              id="new-player-name"
              type="text"
              maxlength="24"
              placeholder="Entrez votre nom…"
              autocomplete="off"
              spellcheck="false"
            />
            <div class="account-name-actions">
              <button class="account-name-back" onclick="AccountScreen.render()">← Retour</button>
              <button class="account-name-confirm" onclick="AccountScreen.confirmName(${slot})">
                Commencer l'aventure →
              </button>
            </div>
          </div>`;
        // Focus auto + validation par Entrée
        const input = document.getElementById('new-player-name');
        requestAnimationFrame(() => input?.focus());
        input?.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') AccountScreen.confirmName(slot);
        });
      }

      function confirmName(slot) {
        const raw  = document.getElementById('new-player-name')?.value?.trim();
        const name = raw || 'Dresseur';
        _launchSlot(slot, name);
      }

      function _launchSlot(slot, newPlayerName) {
        SaveSystem.setActiveSlot(slot);
        const screen = document.getElementById('account-screen');
        screen.classList.add('hiding');
        screen.addEventListener('animationend', () => {
          screen.remove();
          _startGame(newPlayerName);
        }, { once: true });
      }

      function deleteSlot(slot) {
        if (!confirm(`Supprimer définitivement le Compte ${slot} ? Cette action est irréversible.`)) return;
        SaveSystem.clear(slot);
        render();
      }

      function _startGame(newPlayerName) {
        // Arrêter l'autosave de l'écran d'accueil
        clearInterval(window._accueilAutosave);

        // 1. Charger config globale + données joueur du slot sélectionné
        const saved = SaveSystem.load();

        // 2. Initialiser l'état complet du jeu
        GameState.init(saved);

        // 2b. Appliquer le nom choisi si c'est une nouvelle partie
        if (newPlayerName) {
          GameState.updatePlayer({ name: newPlayerName });
          SaveSystem.save(GameState.get());
        }

        // 3. Brancher l'autosave interne (config + joueur)
        GameState.setAutoSaveFn((state) => SaveSystem.save(state));

        // 4. Tirage des quêtes du jour (idempotent : ne retire rien si déjà tiré aujourd'hui)
        QuestSystem.ensureDailyQuestsRolled();

        // 5. Initialiser l'interface de jeu
        GameUI.init();

        // 6. Réinitialiser l'admin (déjà init sur l'accueil, mais le toggle
        //    a changé de contexte — on rebind juste le bouton)
        document.getElementById('admin-toggle')?.replaceWith(
          document.getElementById('admin-toggle')?.cloneNode(true)
        );
        document.getElementById('admin-toggle')?.addEventListener('click', () => AdminPanel.toggle());

        // 7. Autosave périodique (30s)
        SaveSystem.startAutosave(GameState.get, () => {});

        // 8. Sauvegarder en quittant
        window.addEventListener('beforeunload', () => SaveSystem.save(GameState.get()));

        // 9. Bouton de sauvegarde manuelle dans le HUD
        _bindManualSaveBtn();

        // 10. Indicateur de compte actif dans le header
        _renderAccountIndicator();

        // 11. Popup de note de mise à jour (si une note non vue est disponible),
        //     puis popup de récompense(s) de connexion quotidienne.
        PatchNotesUI.presentIfNeeded(() => {
          DailyRewardsUI.presentPending(() => GameUI._updateQuestsBadge());
        });
      }

      function _bindManualSaveBtn() {
        document.addEventListener('click', (e) => {
          if (!e.target.closest('#btn-manual-save')) return;
          const ok = SaveSystem.save(GameState.get());
          const btn = document.getElementById('btn-manual-save');
          if (!btn) return;
          btn.textContent = ok ? '✅ Sauvegardé' : '❌ Erreur';
          btn.classList.toggle('saved', ok);
          btn.classList.toggle('error', !ok);
          setTimeout(() => {
            btn.textContent = '💾 Sauvegarder';
            btn.classList.remove('saved', 'error');
          }, 2000);
        });
      }

      function _renderAccountIndicator() {
        // Injecte un mini-badge "Compte X" + bouton sauvegarde dans la ligne ressources du HUD
        // (le nom/niveau du joueur occupe désormais la ligne du dessus)
        const resRow = document.getElementById('hud-resources');
        if (!resRow) return;
        const slot = SaveSystem.getActiveSlot();
        const badge = document.createElement('span');
        badge.style.cssText = 'font-size:.7rem;color:var(--text-faint);margin-right:4px;white-space:nowrap;';
        badge.textContent = '🦊 Compte ' + slot;
        const saveBtn = document.createElement('button');
        saveBtn.id = 'btn-manual-save';
        saveBtn.className = 'hud-save-btn';
        saveBtn.textContent = '💾 Sauvegarder';
        const wrap = document.createElement('div');
        wrap.id = 'hud-account-wrap';
        wrap.style.cssText = 'display:flex;align-items:center;gap:6px;flex-shrink:0;';
        wrap.appendChild(badge);
        wrap.appendChild(saveBtn);
        resRow.appendChild(wrap);
      }

      return { render, select, confirmName, deleteSlot };
    })();

    /* ============================================================
       PWA UPDATER — enregistrement du Service Worker + détection
       de mise à jour silencieuse (stale-while-revalidate).
       ============================================================ */
    const PWAUpdater = (() => {

      let _updateAvailable = false;

      function init() {
        if (!('serviceWorker' in navigator)) return; // navigateur trop ancien, on ignore silencieusement

        navigator.serviceWorker.register('service-worker.js')
          .then((reg) => {
            // Vérifie une mise à jour dès que le SW est prêt, puis périodiquement
            _requestUpdateCheck();
            setInterval(_requestUpdateCheck, 10 * 60 * 1000); // toutes les 10 minutes
            // Revérifie aussi quand l'app revient au premier plan (mobile)
            document.addEventListener('visibilitychange', () => {
              if (document.visibilityState === 'visible') _requestUpdateCheck();
            });
          })
          .catch((e) => console.warn('[PWA] Échec enregistrement Service Worker :', e));

        navigator.serviceWorker.addEventListener('message', (event) => {
          if (event.data?.type === 'UPDATE_READY') {
            _updateAvailable = true;
            _showUpdateBanner();
          }
        });
      }

      function _requestUpdateCheck() {
        navigator.serviceWorker.ready.then((reg) => {
          reg.active?.postMessage({ type: 'CHECK_FOR_UPDATE' });
        });
      }

      function _showUpdateBanner() {
        if (document.getElementById('pwa-update-banner')) return; // déjà affichée
        const banner = document.createElement('div');
        banner.id = 'pwa-update-banner';
        banner.innerHTML = `
          <span>🐾 Une nouvelle version est disponible.</span>
          <button id="pwa-update-btn">Relancer maintenant</button>
        `;
        document.body.appendChild(banner);
        requestAnimationFrame(() => banner.classList.add('pwa-update-visible'));
        document.getElementById('pwa-update-btn').addEventListener('click', () => {
          window.location.reload();
        });
      }

      return { init };
    })();

    /* ─── Démarrage ──────────────────────────────────────────── */
    (function bootstrap() {
      PWAUpdater.init();
      SaveSystem.restoreActiveSlot();

      // Initialiser le jeu avec la config globale seule (pas de joueur encore)
      // pour que l'admin sur l'écran d'accueil fonctionne
      const globalCfg = SaveSystem.loadGlobalConfig();
      GameState.init(globalCfg); // pas de player → état par défaut côté joueur

      // Brancher l'admin (sans lancer l'UI de jeu)
      AdminPanel.init();
      document.getElementById('admin-toggle')?.addEventListener('click', () => AdminPanel.toggle());

      // Autosave de la config globale pendant qu'on est sur l'écran d'accueil
      // (uniquement config, pas les données joueur)
      const _accueilAutosave = setInterval(() => {
        const state = GameState.get();
        if (state) SaveSystem.saveGlobalConfig(state);
      }, 30000);
      window._accueilAutosave = _accueilAutosave;

      // Sauvegarder la config globale si on ferme sur l'écran d'accueil
      window.addEventListener('beforeunload', () => {
        const state = GameState.get();
        if (state) SaveSystem.saveGlobalConfig(state);
      }, { once: true });

      AccountScreen.render();
      // Le jeu démarre seulement après sélection d'un compte
    })();
  </script>
</body>
</html>
